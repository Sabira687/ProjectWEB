<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EcoBlog | My Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="mainHeader"></header>

<main class="container">
    <section class="profile-card">
        <h2 id="userEmail">Loading...</h2>
        <p id="userBio">No bio yet.</p>
        <button id="openModalBtn" class="btn-outline">Edit Profile</button>
    </section>

    <nav class="profile-tabs">
        <button class="tab-btn active" data-tab="liked">Liked Posts</button>
        <button class="tab-btn" data-tab="following">Following</button>
    </nav>

    <div id="tabContent" class="tab-pane">
    </div>
</main>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Update Profile</h3>
        <div class="form-group">
            <label>About Me (Bio)</label>
            <textarea id="editBio" rows="4"></textarea>
        </div>
        <div class="modal-actions">
            <button id="saveProfileBtn" class="btn">Save Changes</button>
            <button id="closeModalBtn" class="btn-outline">Cancel</button>
        </div>
    </div>
</div>

<script type="module" src="js/profile.js"></script>
</body>
</html>
