<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog | Article</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="mainHeader"></header>

<main class="container">
    <article id="postContent"></article>

    <section class="interaction-bar">
        <button id="likeBtn" class="btn-outline">
            <span id="likeIcon">🤍</span> Like (<span id="likeCount">0</span>)
        </button>
    </section>

    <section class="comments-section">
        <h3>Comments</h3>
        <div id="commentsList"></div>
        <form id="commentForm">
            <textarea id="commentText" required placeholder="Write a comment..."></textarea>
            <button type="submit" class="btn">Send</button>
        </form>
    </section>
</main>

<script type="module" src="js/post.js"></script>
</body>
</html>
